<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindIt</title>
</head>
<body>
    <div id="siteIntroduction">
        <h1>Welcome to FindIt</h1>
        <p>Discover amazing resources tailored to your needs.</p>
    </div>
    <form>
        
        <h1>What Are You Looking For?</h1>
<div id="searchContainer">
    <input type="text" placeholder="Search" id="SearchInput">
    <button type="button" id="searchButton">Search</button>
</div>
        
        <div id="researchTypeDiv">
             <ul>
                <li>
                    <button type="button" class="resource-type">Academic</button>
                </li>
                <li>
                    <button type="button" class="resource-type">Fun</button>
                </li>
                <li>
                    <button type="button" class="resource-type">Experiments</button>
                </li>
                <li>
                    <button type="button" class="resource-type">Dictionary</button>
                </li>
                <li>
                    <button type="button" class="resource-type">Video</button>
                </li>
                <li>
                    <button type="button" class="resource-type">Interactive</button>
                </li>
             </ul>
        </div>
    </form>
    <div id="results"></div>








    <script src="js/app.js"></script>
</body>
</html>
